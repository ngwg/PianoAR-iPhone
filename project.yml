name: PianoAR
options:
  bundleIdPrefix: com.copakerzyr
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGN_IDENTITY: ""

targets:
  PianoAR:
    type: application
    platform: iOS
    scheme:
      testTargets:
        - PianoARTests
    sources:
      - path: PianoAR
    info:
      path: PianoAR/Info.plist
      properties:
        CFBundleDisplayName: PianoAR
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIRequiredDeviceCapabilities:
          - arkit
        UIRequiresFullScreen: true
        UIStatusBarHidden: true
        UIViewControllerBasedStatusBarAppearance: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: "PianoAR uses the rear camera for AR passthrough so you can see your piano and the overlaid note guide while wearing the headset."
        NSMicrophoneUsageDescription: "PianoAR optionally listens for note onsets to cross-check vision-based press detection."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.copakerzyr.pianoar
        ENABLE_PREVIEWS: YES

  PianoARTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PianoARTests
    dependencies:
      - target: PianoAR
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.copakerzyr.pianoar.tests
        GENERATE_INFOPLIST_FILE: YES
