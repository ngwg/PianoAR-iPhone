name: Build unsigned IPA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Show available Xcode versions
        run: ls /Applications | grep Xcode || true

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build archive (unsigned)
        run: |
          set -euo pipefail
          xcodebuild \
            -project PianoAR.xcodeproj \
            -scheme PianoAR \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/PianoAR.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            EXPANDED_CODE_SIGN_IDENTITY="" \
            archive

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          cd build/PianoAR.xcarchive/Products/Applications
          mkdir -p Payload
          cp -R PianoAR.app Payload/
          zip -qry "$GITHUB_WORKSPACE/build/PianoAR-unsigned.ipa" Payload
          ls -la "$GITHUB_WORKSPACE/build/"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: PianoAR-unsigned-ipa
          path: build/PianoAR-unsigned.ipa
          if-no-files-found: error
          retention-days: 14
