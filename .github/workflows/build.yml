name: Build unsigned IPA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Show available Xcode versions
        run: ls /Applications | grep Xcode || true

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Test hand-pose stabilization
        # The test host is the full app running in a simulator (no ARKit
        # runtime there) — a hang here must not eat the whole job budget.
        timeout-minutes: 15
        run: |
          set -euo pipefail
          SIMULATOR_ID="$(
            xcrun simctl list devices available -j | python3 -c '
          import json, sys
          devices = json.load(sys.stdin)["devices"]
          print(next(
              device["udid"]
              for runtime in devices.values()
              for device in runtime
              if device["name"].startswith("iPhone") and device.get("isAvailable", True)
          ))
          '
          )"
          xcodebuild test \
            -project PianoAR.xcodeproj \
            -scheme PianoAR \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=$SIMULATOR_ID" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Build archive (unsigned)
        run: |
          set -euo pipefail
          xcodebuild \
            -project PianoAR.xcodeproj \
            -scheme PianoAR \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/PianoAR.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            EXPANDED_CODE_SIGN_IDENTITY="" \
            archive

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          cd build/PianoAR.xcarchive/Products/Applications
          mkdir -p Payload
          cp -R PianoAR.app Payload/
          zip -qry "$GITHUB_WORKSPACE/build/PianoAR-unsigned.ipa" Payload
          ls -la "$GITHUB_WORKSPACE/build/"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: PianoAR-unsigned-ipa
          path: build/PianoAR-unsigned.ipa
          if-no-files-found: error
          retention-days: 14
